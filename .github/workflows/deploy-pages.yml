name: Deploy ThreadSense Frontend

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build add-in for GitHub Pages
        env:
          VITE_APP_MODE: mock
          VITE_MESSAGE_SOURCE: mock
          VITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build:addin

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/outlook-addin/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
